name: SonarCloud Analysis

on:
push:
branches: ["quantity-measurement-project"]
pull_request:
branches: ["quantity-measurement-project"]

jobs:
build:
runs-on: windows-latest

```
steps:
  - name: Checkout repository
    uses: actions/checkout@v4
    with:
      fetch-depth: 0

  - name: Setup .NET
    uses: actions/setup-dotnet@v4
    with:
      dotnet-version: 8.0.x

  - name: Setup Java
    uses: actions/setup-java@v4
    with:
      java-version: 17
      distribution: 'zulu'

  - name: Install SonarScanner
    run: dotnet tool install --global dotnet-sonarscanner

  - name: Restore dependencies
    run: dotnet restore QuantityMeasurementApp/QuantityMeasurementApp.sln

  - name: SonarCloud Begin Analysis
    run: |
      dotnet-sonarscanner begin /k:"Akshay-368_Capgemini-Training-Meetup" /o:"akshay-368" /d:sonar.host.url="https://sonarcloud.io" /d:sonar.token="${{ secrets.SONAR_TOKEN }}" /d:sonar.cs.opencover.reportsPaths="coverage/coverage.opencover.xml"

  - name: Build Solution
    run: dotnet build QuantityMeasurementApp/QuantityMeasurementApp.sln --no-restore

  - name: Run Tests with Coverage
    run: |
      dotnet test QuantityMeasurementApp/QuantityMeasurementApp.sln --no-build /p:CollectCoverage=true /p:CoverletOutputFormat=opencover /p:CoverletOutput=./coverage/

  - name: SonarCloud End Analysis
    run: dotnet-sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"
```
